# Smithery Registry — HiveCompute MCP Server

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      did:
        type: string
        title: "Agent DID"
        x-order: 0
      api_key:
        type: string
        title: "API Key"
        x-sensitive: true
        x-order: 1
      default_rail:
        type: string
        title: "Settlement Rail"
        enum:
          - base-usdc
          - aleo-usdcx
        default: base-usdc
        x-order: 2
    required: []
  url: https://hivecompute-g2g7.onrender.com/mcp

name: hivecompute-mcp
displayName: HiveCompute — Autonomous Agent Inference Router
version: "1.0.0"
description: >
  OpenAI-compatible inference router for the Hive agent economy. Run any LLM and pay
  per token in USDC on Base L2. Hive routes to the cheapest available model meeting
  your latency/quality spec. Part of Hive Civilization (thehiveryiq.com).

author:
  name: Steve Rotzin
  email: steve@thehiveryiq.com
  url: https://www.thehiveryiq.com

license: MIT
homepage: https://www.thehiveryiq.com
repository:
  type: git
  url: https://github.com/srotzin/hive-mcp-compute

transport: streamable-http
endpoint: https://hivecompute-g2g7.onrender.com/mcp
protocol: "2024-11-05"

categories:
  - compute
  - inference
  - agent-to-agent
  - payments

tags:
  - mcp
  - hive
  - compute
  - inference
  - llm-routing
  - pay-per-use
  - usdc
  - ai-agents
  - defai
  - openai-compatible

runtime:
  type: node
  version: ">=18"
  command: node server.js
  env:
    - name: PORT
      default: "3000"
      required: false
